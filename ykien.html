<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="feedback-container">
      <a href="mienTrung.html" class="back-link">← Quay về Trang chủ</a>
      <h1>Đóng góp ý kiến</h1>
      <form class="feedback-form">
        <label for="name">Họ và tên</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Nhập họ tên..."
          required
        />
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Nhập email..."
          required
        />
        <label for="message">Ý kiến của bạn</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Nhập ý kiến..."
          required
        ></textarea>
        <button type="submit">Gửi ý kiến</button>
      </form>
    </div>
    <style>
      body {
        background: linear-gradient(135deg, #fdf6e3 0%, #f5e6ca 100%);
        font-family: "Open Sans", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 0;
      }
      .feedback-container {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        padding: 36px 32px 28px 32px;
        max-width: 420px;
        width: 100%;
        margin-top: 24px;
        animation: fadeInUp 0.7s;
      }
      .feedback-container h1 {
        text-align: center;
        color: #d35400;
        font-family: "Playfair Display", serif;
        margin-bottom: 18px;
      }
      .feedback-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .feedback-form label {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 4px;
      }
      .feedback-form input,
      .feedback-form textarea {
        border: 1px solid #e0c3a0;
        border-radius: 10px;
        padding: 11px 13px;
        font-size: 1rem;
        background: #fdfaf6;
        transition: border-color 0.2s;
      }
      .feedback-form input:focus,
      .feedback-form textarea:focus {
        border-color: #d35400;
        outline: none;
      }
      .feedback-form button {
        background: linear-gradient(90deg, #d35400 60%, #f39c12 100%);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 0;
        font-size: 1.1rem;
        font-weight: 700;
        margin-top: 8px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(211, 84, 0, 0.08);
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .feedback-form button:hover {
        background: linear-gradient(90deg, #b34700 60%, #e67e22 100%);
        transform: translateY(-2px) scale(1.03);
      }
      .back-link {
        display: inline-block;
        margin-bottom: 18px;
        color: #d35400;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: #a04000;
        text-decoration: underline;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </body>
</html>
